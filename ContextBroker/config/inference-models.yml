# Context Broker — Inference Models Catalog
#
# Curated list of tested models per inference slot.
# Used by the change_inference tool to present available options.
# Mount into the container alongside config.yml.
#
# DEPLOYMENT TIERS:
#   Premium — best quality, highest cost
#   Nominal — balanced quality/cost (recommended for production)
#   Local   — no API keys, runs on Ollama/Infinity (default out-of-box)
#
# Each slot lists models by provider. Each model entry includes:
#   model: model identifier (as passed to the API)
#   base_url: API endpoint
#   api_key_env: environment variable holding the API key ("" for keyless)
#   context: context window size in tokens (approximate)
#   embedding_dims: output dimensions (embeddings only)
#   notes: any caveats or recommendations
#
# Providers:
#   openai    — OpenAI (api.openai.com)
#   google    — Google Gemini (generativelanguage.googleapis.com)
#   anthropic — Anthropic Claude (api.anthropic.com, OpenAI-compatible endpoint)
#   xai       — xAI Grok (api.x.ai)
#   together  — Together AI (api.together.xyz)
#   ollama    — Local Ollama (no API key, no internet required)
#   infinity  — Local Infinity (no API key, embeddings + reranking)

# ============================================================
# Imperator — conversational agent LLM
# ============================================================
# Needs: strong reasoning, tool calling, long context.
# Configured in te.yml (TE configuration).
#
# RECOMMENDED:
#   Premium: google / gemini-3.1-pro
#   Nominal: google / gemini-2.5-pro
#   Local:   ollama / qwen2.5:7b

imperator:
  google:
    - model: gemini-3.1-pro
      base_url: https://generativelanguage.googleapis.com/v1beta/openai
      api_key_env: GOOGLE_API_KEY
      context: 1048576
      notes: PREMIUM. Best reasoning available.

    - model: gemini-2.5-pro
      base_url: https://generativelanguage.googleapis.com/v1beta/openai
      api_key_env: GOOGLE_API_KEY
      context: 1048576
      notes: NOMINAL. Strong reasoning, lower cost.

    - model: gemini-2.5-flash
      base_url: https://generativelanguage.googleapis.com/v1beta/openai
      api_key_env: GOOGLE_API_KEY
      context: 1048576
      notes: Fast, large context. May return empty responses intermittently.

  openai:
    - model: gpt-4.1
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      context: 1048576
      notes: Flagship. Best tool calling.

    - model: gpt-4.1-mini
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      context: 1048576
      notes: Fast and cheap. Good tool calling.

  anthropic:
    - model: claude-sonnet-4-6
      base_url: https://api.anthropic.com/v1
      api_key_env: ANTHROPIC_API_KEY
      context: 200000
      notes: Strong reasoning and tool calling.

    - model: claude-haiku-4-5-20251001
      base_url: https://api.anthropic.com/v1
      api_key_env: ANTHROPIC_API_KEY
      context: 200000
      notes: Fast and cheap.

  xai:
    - model: grok-3
      base_url: https://api.x.ai/v1
      api_key_env: XAI_API_KEY
      context: 131072
      notes: Flagship.

    - model: grok-3-mini
      base_url: https://api.x.ai/v1
      api_key_env: XAI_API_KEY
      context: 131072
      notes: Fast and cheap.

  together:
    - model: meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      base_url: https://api.together.xyz/v1
      api_key_env: TOGETHER_API_KEY
      context: 1048576
      notes: Open-weight flagship on Together.

    - model: meta-llama/Llama-4-Scout-17B-16E-Instruct
      base_url: https://api.together.xyz/v1
      api_key_env: TOGETHER_API_KEY
      context: 524288
      notes: Fast open-weight.

  ollama:
    - model: qwen2.5:7b
      base_url: http://context-broker-ollama:11434/v1
      api_key_env: ""
      context: 32768
      notes: LOCAL. Default out-of-box. No API key needed.

    - model: llama3.1:8b
      base_url: http://context-broker-ollama:11434/v1
      api_key_env: ""
      context: 131072
      notes: LOCAL. Good local alternative.


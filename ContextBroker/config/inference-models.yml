# ============================================================
# Extraction — memory extraction via Mem0
# ============================================================
# Needs: reliable JSON output (response_format enforcement).
# Only providers with verified JSON mode are listed.
# Configured in config.yml (AE configuration).
#
# NOT SUPPORTED for extraction:
#   - Google Gemini via OpenAI endpoint (drops response_format)
#   - Anthropic (no response_format support in OpenAI-compat mode)
#
# RECOMMENDED:
#   Premium: openai / o3-mini — best structured reasoning
#   Nominal: openai / gpt-4.1-mini — reliable JSON, fast
#   Local:   ollama / qwen2.5:7b

extraction:
  openai:
    - model: o3-mini
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      context: 200000
      notes: PREMIUM. Best structured reasoning for knowledge extraction. Extracts implicit relationships.

    - model: gpt-4.1-mini
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      context: 1048576
      notes: NOMINAL. Verified JSON mode. Recommended for extraction.

    - model: gpt-4.1-nano
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      context: 1048576
      notes: Cheapest option with verified JSON mode.

  xai:
    - model: grok-3-mini
      base_url: https://api.x.ai/v1
      api_key_env: XAI_API_KEY
      context: 131072
      notes: Verified JSON mode.

  together:
    - model: meta-llama/Llama-4-Scout-17B-16E-Instruct
      base_url: https://api.together.xyz/v1
      api_key_env: TOGETHER_API_KEY
      context: 524288
      notes: JSON mode via Together API.

  ollama:
    - model: qwen2.5:7b
      base_url: http://context-broker-ollama:11434/v1
      api_key_env: ""
      context: 32768
      notes: LOCAL. Verified JSON mode. Default out-of-box.

# ============================================================
# Embeddings — vector embeddings for conversation search
# ============================================================
# Needs: consistent dimensions, fast batch processing, MRL support.
# embedding_dims MUST match the model output or your MRL-requested dimensions.
# Changing embedding models requires a full re-embed (wipe + regenerate).
# Configured in config.yml (AE configuration).
#
# MRL (Matryoshka Representation Learning):
#   Modern models (OpenAI v3, Gemini v2+) support requesting fewer dims
#   via the API 'dimensions' parameter. This reduces DB storage and enables
#   HNSW indexing (pgvector limit: 2000 dims for float32).
#   Recommended: 1024 dims for conversations (retains nuance).
#
# RECOMMENDED:
#   Premium: openai / text-embedding-3-large (MRL → 1024 dims)
#   Nominal: google / gemini-embedding-2-preview (MRL → 1024 dims)
#   Local:   infinity / nomic-ai/nomic-embed-text-v1.5 (768 dims, no MRL)

embeddings:
  openai:
    - model: text-embedding-3-large
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      embedding_dims: 1024
      notes: PREMIUM. Best semantic accuracy. Use MRL to request 1024 dims (native 3072).

    - model: text-embedding-3-small
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      embedding_dims: 1024
      notes: Good quality/cost. Supports MRL.

  google:
    - model: gemini-embedding-2-preview
      base_url: https://generativelanguage.googleapis.com/v1beta/openai
      api_key_env: GOOGLE_API_KEY
      embedding_dims: 1024
      notes: NOMINAL. Supports MRL via dimensions parameter. Request 1024 dims.

  infinity:
    - model: nomic-ai/nomic-embed-text-v1.5
      base_url: http://context-broker-infinity:7997
      api_key_env: ""
      embedding_dims: 768
      notes: LOCAL. Default out-of-box. No MRL — fixed 768 dims.

  together:
    - model: togethercomputer/m2-bert-80M-8k-retrieval
      base_url: https://api.together.xyz/v1
      api_key_env: TOGETHER_API_KEY
      embedding_dims: 768
      notes: Fast, cheap. No MRL.

# ============================================================
# Log Embeddings — vector embeddings for system log search
# ============================================================
# Separate from conversation embeddings. Logs don't need high
# granularity — use small dims (256 for cloud, 768 for local).
# Configured in config.yml under log_embeddings section.
#
# MRL: Use 256 dims for logs — strips noise (timestamps, hex, UUIDs),
#      keeps core semantic meaning of the error.
#
# RECOMMENDED:
#   Premium: openai / text-embedding-3-large (MRL → 256 dims)
#   Nominal: openai / text-embedding-3-small (MRL → 256 dims)
#   Local:   ollama / nomic-embed-text (768 dims, no MRL)

log_embeddings:
  openai:
    - model: text-embedding-3-large
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      embedding_dims: 256
      notes: PREMIUM. Best log retrieval. MRL → 256 dims strips noise.

    - model: text-embedding-3-small
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      embedding_dims: 256
      notes: NOMINAL. Good enough for logs. MRL → 256 dims.

  ollama:
    - model: nomic-embed-text
      base_url: http://context-broker-ollama:11434/v1
      api_key_env: ""
      embedding_dims: 768
      notes: LOCAL. Default out-of-box. No MRL — fixed 768 dims.

# ============================================================
# Reranker — hybrid search result refinement
# ============================================================
# Optional. Set provider: none in config.yml to disable.
# Local Infinity works for all tiers — no reason to use cloud.

reranker:
  infinity:
    - model: mixedbread-ai/mxbai-rerank-xsmall-v1
      base_url: http://context-broker-infinity:7997
      api_key_env: ""
      notes: Default for all tiers. Local, no API key needed.

  together:
    - model: Salesforce/Llama-Rank-V2
      base_url: https://api.together.xyz/v1
      api_key_env: TOGETHER_API_KEY
      notes: Requires dedicated endpoint on Together (not serverless).

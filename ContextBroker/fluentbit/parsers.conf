# Fluent Bit parsers for Context Broker logs

# Docker JSON log file format (one JSON object per line)
[PARSER]
    Name         docker_json
    Format       json
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z

# Structured JSON log format from langgraph container
[PARSER]
    Name         json_log
    Format       json
    Time_Key     timestamp
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z

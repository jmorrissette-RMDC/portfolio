# Fluent Bit configuration for Context Broker
# Tails Docker JSON log files and writes to Postgres system_logs table.
#
# Mount the Docker container log directory at /var/log/docker-containers
# inside this container. The host-side path varies:
# - Default Docker: /var/lib/docker/containers
# - Custom Docker root: <root>/containers
# Override the host path in docker-compose.override.yml.
#
# The tag for each log entry is derived from the file path, which contains
# the container ID. Container name resolution happens at query time.

[SERVICE]
    Flush        5
    Log_Level    info
    Parsers_File parsers.conf

# Tail all Docker container JSON log files
[INPUT]
    Name              tail
    Path              /var/log/docker-containers/*/*.log
    Parser            docker_json
    Tag               docker.*
    Refresh_Interval  10
    Buffer_Max_Size   1M
    DB                /tmp/fluentbit-tail.db

# Write to Postgres system_logs table (Fluent Bit native schema: tag, time, data)
[OUTPUT]
    Name              pgsql
    Match             docker.*
    Host              context-broker-postgres
    Port              5432
    User              context_broker
    Password          ${POSTGRES_PASSWORD}
    Database          context_broker
    Table             system_logs
    Async             false

# Fluent Bit configuration for Context Broker
# Tails Docker JSON log files, enriches with container names via Docker socket,
# filters to only context-broker-* containers, writes to Postgres.
#
# Requires two read-only mounts:
# - Docker socket: /var/run/docker.sock (for container name resolution)
# - Docker log dir: /var/log/docker-containers (host path varies, see override)

[SERVICE]
    Flush        5
    Log_Level    info
    Parsers_File parsers.conf

# Tail all Docker container JSON log files
[INPUT]
    Name              tail
    Path              /var/log/docker-containers/*/*.log
    Parser            docker_json
    Tag               docker.<container_id>
    Refresh_Interval  10
    Buffer_Max_Size   1M
    DB                /tmp/fluentbit-tail.db

# Enrich with container name via Docker socket
[FILTER]
    Name              docker
    Match             docker.*

# Only keep context-broker containers
[FILTER]
    Name              grep
    Match             docker.*
    Regex             container_name ^context-broker

# Write to Postgres system_logs table
[OUTPUT]
    Name              pgsql
    Match             docker.*
    Host              context-broker-postgres
    Port              5432
    User              context_broker
    Password          ${POSTGRES_PASSWORD}
    Database          context_broker
    Table             system_logs
    Async             false

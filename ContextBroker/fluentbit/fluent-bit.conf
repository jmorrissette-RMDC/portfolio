# Fluent Bit configuration for Context Broker
# Collects logs from all context-broker-* containers and writes to Postgres.

[SERVICE]
    Flush        5
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         docker
    Tag          docker.*
    Docker_Mode  On

[FILTER]
    Name         grep
    Match        docker.*
    Regex        container_name context-broker

[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       json_log
    Reserve_Data On

[OUTPUT]
    Name         pgsql
    Match        docker.*
    Host         context-broker-postgres
    Port         5432
    User         context_broker
    Password     ${POSTGRES_PASSWORD}
    Database     context_broker
    Table        system_logs
    Timestamp_Key log_timestamp

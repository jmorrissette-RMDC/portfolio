# Context Broker — Nginx gateway configuration
# Pure routing layer. No application logic.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;

    # Upstream: LangGraph application container
    upstream context_broker_langgraph {
        server context-broker-langgraph:8000;
    }

    server {
        listen 8080;
        server_name _;

        # Basic auth — protects all endpoints except /health (needed for LB health checks)
        # Generate: htpasswd -c /etc/nginx/.htpasswd username
        # Mount .htpasswd via docker-compose volume or copy into container
        auth_basic "Context Broker";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Increase timeouts for long-running LLM operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Health check — no auth (load balancer probes)
        location /health {
            auth_basic off;
            proxy_pass http://context_broker_langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # MCP endpoint — HTTP/SSE transport
        location /mcp {
            proxy_pass http://context_broker_langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE requires these headers
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # OpenAI-compatible chat endpoint
        location /v1/chat/completions {
            proxy_pass http://context_broker_langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE streaming support
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # Prometheus metrics endpoint
        location /metrics {
            proxy_pass http://context_broker_langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}

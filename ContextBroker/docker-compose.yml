# Context Broker — Docker Compose
# State 4 MAD: standalone deployment, all dependencies configurable
#
# Usage:
#   docker compose up -d
#
# Customize host paths, ports, and resource limits via docker-compose.override.yml
# Do not modify this file directly.

services:

  context-broker:
    image: nginx:1.25.3-alpine
    container_name: context-broker
    hostname: context-broker
    restart: unless-stopped
    networks:
      - default
      - context-broker-net
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

  context-broker-langgraph:
    build:
      context: .
      dockerfile: Dockerfile
    image: context-broker-langgraph:latest
    container_name: context-broker-langgraph
    hostname: context-broker-langgraph
    restart: unless-stopped
    networks:
      - context-broker-net
    volumes:
      - ./config:/config
      - ./data:/data
      - ./packages:/app/packages:ro
    env_file:
      - ./config/credentials/.env
    environment:
      - POSTGRES_HOST=context-broker-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-context_broker}
      - POSTGRES_USER=${POSTGRES_USER:-context_broker}
      - NEO4J_HOST=context-broker-neo4j
      - NEO4J_PORT=7687
      - NEO4J_HTTP_PORT=7474
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

  context-broker-postgres:
    image: pgvector/pgvector:0.7.0-pg16
    container_name: context-broker-postgres
    hostname: context-broker-postgres
    restart: unless-stopped
    networks:
      - context-broker-net
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    env_file:
      - ./config/credentials/.env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-context_broker}
      - POSTGRES_USER=${POSTGRES_USER:-context_broker}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-context_broker}", "-d", "${POSTGRES_DB:-context_broker}"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  context-broker-neo4j:
    image: neo4j:5.26.0
    container_name: context-broker-neo4j
    hostname: context-broker-neo4j
    restart: unless-stopped
    networks:
      - context-broker-net
    volumes:
      - ./data/neo4j:/data
    environment:
      # NEO4J_AUTH=none is intentional: Neo4j is only accessible on the
      # internal Docker network (context-broker-net) with no published ports.
      # Authentication is unnecessary and adds operational complexity.
      - NEO4J_AUTH=none
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Redis removed — background processing is DB-driven.
  # Workers poll PostgreSQL for unprocessed messages.
  # Advisory locks replace Redis distributed locks.

  # Optional: local embeddings and reranking via Infinity.
  # Serves OpenAI-compatible /v1/embeddings and /v1/rerank APIs.
  # CPU only, torch engine — no GPU conflicts with Ollama.
  # First boot downloads model weights to ./data/infinity.
  # Remove or comment out if using cloud embedding/reranking providers.
  context-broker-infinity:
    image: michaelf34/infinity:0.0.77
    container_name: context-broker-infinity
    hostname: context-broker-infinity
    restart: unless-stopped
    command: >
      v2
      --model-id nomic-ai/nomic-embed-text-v1.5
      --model-id mixedbread-ai/mxbai-rerank-xsmall-v1
      --engine torch
      --port 7997
    networks:
      - context-broker-net
    volumes:
      - ./data/infinity:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7997/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3

  # Optional: local inference via Ollama (no API keys needed)
  # Provides LLM on the internal network. Embeddings and reranking are
  # handled by the Infinity container above.
  # Remove or comment out if using cloud providers exclusively.
  context-broker-ollama:
    image: ollama/ollama:0.6.2
    container_name: context-broker-ollama
    hostname: context-broker-ollama
    restart: unless-stopped
    networks:
      - context-broker-net
    environment:
      - NVIDIA_VISIBLE_DEVICES=all   # Expose GPUs if available; ignored if no NVIDIA runtime
      - OLLAMA_SCHED_SPREAD=true     # Distribute model across all available GPUs
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Optional: log collection for Imperator diagnostics.
  # Discovers all containers on context-broker-net via Docker API,
  # tails their logs, and writes to Postgres with resolved container names.
  # Remove or comment out if deployment has its own log collector.
  context-broker-log-shipper:
    build:
      context: ./log_shipper
    container_name: context-broker-log-shipper
    hostname: context-broker-log-shipper
    restart: unless-stopped
    networks:
      - context-broker-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - POSTGRES_DSN=postgresql://context_broker:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@context-broker-postgres:5432/context_broker
    env_file:
      - ./config/credentials/.env

  # Optional: Gradio Chat UI for the Imperator.
  # Multi-MAD client — connects to any State 4 MAD via standard endpoints.
  # Publishes port 7860 for browser access.
  context-broker-ui:
    build:
      context: ./ui
    container_name: context-broker-ui
    hostname: context-broker-ui
    restart: unless-stopped
    networks:
      - context-broker-net
    volumes:
      - ./ui/config.yml:/app/config.yml:ro

  # Optional: Alerter webhook relay.
  # Receives CloudEvents webhooks from the Imperator's send_notification tool,
  # optionally formats via LLM, and fans out to Slack/Discord/ntfy/SMTP/webhook.
  # Remove or comment out if not using multi-channel alerting.
  context-broker-alerter:
    build:
      context: ./alerter
    container_name: context-broker-alerter
    hostname: context-broker-alerter
    restart: unless-stopped
    networks:
      - context-broker-net
    environment:
      - POSTGRES_DSN=postgresql://context_broker:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@context-broker-postgres:5432/context_broker
      - ALERTER_CONFIG=/config/alerter.yml
    env_file:
      - ./config/credentials/.env
    volumes:
      - ./config:/config:ro

networks:
  context-broker-net:
    driver: bridge


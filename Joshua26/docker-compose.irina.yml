# Host Override: Irina (x.x.x.110)
# Storage server - 44TB ZFS RAID
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.irina.yml up -d
#
# Runs: starret, brin, blueprint

# Volume definitions for Irina - local ZFS paths
volumes:
  storage:
    external: false
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/storage

  workspace:
    external: false
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/storage/workspace

# Disable compute/M5 services on Irina (they run on M5)
services:
  template:
    profiles: ["m5-only"]

  template-langgraph:
    profiles: ["m5-only"]

  template-postgres:
    profiles: ["m5-only"]

  template-service:
    profiles: ["m5-only"]

  # Apgar MAD group — runs on M5
  apgar:
    profiles: ["m5-only"]

  apgar-langgraph:
    profiles: ["m5-only"]

  # Rogers MAD group — all 5 containers run on M5
  rogers:
    profiles: ["m5-only"]

  rogers-langgraph:
    profiles: ["m5-only"]

  rogers-postgres:
    profiles: ["m5-only"]

  rogers-neo4j:
    profiles: ["m5-only"]

  rogers-redis:
    profiles: ["m5-only"]

  sutherland:
    profiles: ["m5-only"]

  sutherland-langgraph:
    profiles: ["m5-only"]

  sutherland-ray-head:
    profiles: ["m5-only"]

  sutherland-postgres:
    profiles: ["m5-only"]

  malory:
    profiles: ["m5-only"]

  # Henson MAD group — runs on M5
  henson:
    profiles: ["m5-only"]

  henson-langgraph:
    profiles: ["m5-only"]

  henson-postgres:
    profiles: ["m5-only"]

  henson-nginx:
    profiles: ["m5-only"]

  henson-openwebui:
    profiles: ["m5-only"]

  # Hopper MAD group — runs on M5 (eMAD library — no standalone containers post-conversion)
  hopper:
    profiles: ["m5-only"]

  hopper-langgraph:
    profiles: ["m5-only"]

  # Kaiser MAD group — runs on M5
  kaiser:
    profiles: ["m5-only"]

  kaiser-langgraph:
    profiles: ["m5-only"]

  kaiser-postgres:
    profiles: ["m5-only"]

  # Muybridge MAD group — runs on M5 (GPU server)
  muybridge:
    profiles: ["m5-only"]

  muybridge-langgraph:
    profiles: ["m5-only"]

  # muybridge-vace: REMOVED — VACE moved to RunPod

  muybridge-faceswap:
    profiles: ["m5-only"]

  hymie:
    profiles: ["hymie-only"]

  # Blueprint postgres — ADR-052: explicit bind mount suppresses anonymous VOLUME
  # declared by postgres:16-alpine. Uses irina's ZFS workspace path.
  blueprint-postgres:
    volumes:
      - storage:/storage
      - workspace:/workspace
      - /mnt/storage/workspace/blueprint/databases/postgres/data:/var/lib/postgresql/data

  # Sutherland Ray Worker for Irina (Tesla P4)
  sutherland-ray-worker-p4:
    build:
      context: mads/sutherland/sutherland-ray-head
      dockerfile: Dockerfile
    image: joshua26/sutherland-ray-head
    container_name: sutherland-ray-worker-p4
    hostname: sutherland-ray-worker-p4
    restart: unless-stopped
    runtime: nvidia
    networks:
      - joshua-net
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: >-
      bash -lc "ray start --address=sutherland-ray-head:6379
      --resources='{\"accelerator_type:P4\": 2}' --block"
    volumes:
      - storage:/storage
      - workspace:/workspace
    labels:
      - "mad.logical_actor=sutherland"
      - "mad.component=ray-worker-p4"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
